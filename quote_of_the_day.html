<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quote of the Day</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e293b, #0f172a);
    color: #f1f5f9;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0;
  }
  .card {
    background: #1e293bcc;
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 40px;
    max-width: 550px;
    width: 90%;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }
  h1 { font-size: 1.2rem; color: #94a3b8; margin-bottom: 24px; letter-spacing: 1px; }
  #quoteText {
    font-size: 1.5rem;
    font-style: italic;
    min-height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.3s ease;
  }
  #quoteAuthor {
    margin-top: 16px;
    color: #38bdf8;
    font-weight: 600;
  }
  #sourceTag {
    margin-top: 10px;
    font-size: 0.75rem;
    color: #64748b;
  }
  button {
    margin-top: 28px;
    padding: 12px 28px;
    background: #38bdf8;
    color: #0f172a;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 1rem;
    transition: background 0.2s;
  }
  button:hover { background: #0ea5e9; }
  button:disabled { background: #475569; cursor: not-allowed; }
  .error { color: #f87171; font-size: 0.9rem; margin-top: 10px; }
</style>
</head>
<body>

<div class="card">
  <h1>QUOTE OF THE DAY</h1>
  <div id="quoteText">Loading your quote...</div>
  <div id="quoteAuthor"></div>
  <div id="sourceTag"></div>
  <div id="errorMsg" class="error"></div>
  <button id="newQuoteBtn">New Quote</button>
</div>

<script>
  // ---- Local JSON fallback data ----
  // This array acts as our "offline JSON" in case the API call fails.
  const localQuotes = [
    { content: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
    { content: "Code is like humor. When you have to explain it, it's bad.", author: "Cory House" },
    { content: "First, solve the problem. Then, write the code.", author: "John Johnson" },
    { content: "Simplicity is the soul of efficiency.", author: "Austin Freeman" },
    { content: "Java is to JavaScript what car is to Carpet.", author: "Chris Heilmann" }
  ];

  const quoteTextEl = document.getElementById("quoteText");
  const quoteAuthorEl = document.getElementById("quoteAuthor");
  const sourceTagEl = document.getElementById("sourceTag");
  const errorMsgEl = document.getElementById("errorMsg");
  const newQuoteBtn = document.getElementById("newQuoteBtn");

  // Picks a random quote from the local fallback array
  function getLocalQuote() {
    const index = Math.floor(Math.random() * localQuotes.length);
    return localQuotes[index];
  }

  // Renders quote data (works for both API and local JSON shape)
  function renderQuote(data, source) {
    quoteTextEl.style.opacity = 0;
    setTimeout(() => {
      quoteTextEl.textContent = `"${data.content}"`;
      quoteAuthorEl.textContent = `— ${data.author}`;
      sourceTagEl.textContent = source === "api" ? "Source: Live API" : "Source: Local JSON (offline fallback)";
      quoteTextEl.style.opacity = 1;
    }, 150);
  }

  // Main fetch function with JSON parsing + fallback handling
  async function fetchQuote() {
    newQuoteBtn.disabled = true;
    errorMsgEl.textContent = "";
    quoteTextEl.textContent = "Fetching a fresh quote...";

    try {
      // Attempt to fetch from a public quotes API
      const response = await fetch("https://api.quotable.io/random");

      // response.ok is false for HTTP errors (404, 500) but fetch() itself
      // only rejects on network failure -- so we must check this manually.
      if (!response.ok) {
        throw new Error(`API responded with status ${response.status}`);
      }

      // Parse the JSON body into a JS object
      const data = await response.json();

      renderQuote({ content: data.content, author: data.author }, "api");

    } catch (err) {
      // Covers: network failure, CORS issues, non-OK response, bad JSON
      console.warn("API fetch failed, using local fallback:", err.message);
      errorMsgEl.textContent = "Couldn't reach the live API — showing an offline quote instead.";
      const fallback = getLocalQuote();
      renderQuote(fallback, "local");
    } finally {
      newQuoteBtn.disabled = false;
    }
  }

  newQuoteBtn.addEventListener("click", fetchQuote);

  // Load a quote as soon as the page opens
  fetchQuote();
</script>

</body>
</html>
